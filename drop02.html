<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HANGMEN — DROP 02</title>

<style>
:root {
  --bg: #080808;
  --text: #d9d2ca;
  --muted: #9d958b;
  --max: 1540px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background:
    radial-gradient(circle at 18% 14%, rgba(255,255,255,0.045), transparent 24%),
    radial-gradient(circle at 82% 30%, rgba(255,255,255,0.03), transparent 28%),
    radial-gradient(circle at 55% 78%, rgba(255,255,255,0.025), transparent 26%),
    #080808;
  color: var(--text);
}
a.brand,
a.brand:hover,
a.brand:focus,
a.brand:visited {
  color: #d9d2ca !important;
  text-decoration: none !important;
}
.wrap {
  width: min(calc(100% - 52px), var(--max));
  margin: 0 auto;
}

.topbar {
  position: sticky;
  top: 0;
  background: rgba(8,8,8,0.84);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.topbar-inner {
  min-height: 74px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}

.brand {
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 0.42em;
  text-transform: uppercase;
  white-space: nowrap;
}

.nav {
  display: flex;
  gap: 24px;
  color: var(--muted);
  font-size: 0.94rem;
  flex-wrap: wrap;
}

.nav a {
  text-decoration: none;
  color: var(--muted);
  white-space: nowrap;
}

.nav a {
  text-decoration: none;
  color: var(--muted);
}

.nav a:hover {
  color: var(--text);
}

.hero {
  min-height: calc(100vh - 74px);
  display: flex;
  align-items: center;
  justify-content: center;
}

.center {
  text-align: center;
}

.eyebrow {
  color: var(--muted);
  font-size: 0.82rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  margin-bottom: 14px;
  text-align: center;
}

h1 {
  font-size: clamp(3rem, 8vw, 6rem);
  letter-spacing: 0.12em;
  margin: 0;
}

.sub {
  margin-top: 16px;
  color: var(--muted);
  font-size: 1rem;
}

.back,
.back:hover,
.back:focus,
.back:visited {
  margin-top: 30px;
  display: inline-block;
  border: 1px solid rgba(255,255,255,0.12);
  padding: 10px 16px;
  border-radius: 10px;
  color: var(--text);
  text-decoration: none;
  font-size: 0.82rem;
  background: rgba(255,255,255,0.04);
}

.back:hover {
  border-color: rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.08);
}
@media (max-width: 760px) {
  .wrap {
    width: min(calc(100% - 36px), var(--max));
  }

  .topbar-inner {
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;
    min-height: auto;
    gap: 6px;
    padding: 10px 0 6px;
  }

  .brand {
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.42em;
    white-space: nowrap;
  }

  .nav {
    gap: 10px;
    font-size: 0.94rem;
    flex-wrap: wrap;
  }

  h1 {
    font-size: clamp(2.6rem, 13vw, 4.2rem);
    line-height: 0.96;
    letter-spacing: 0.08em;
  }
}
</style>
</head>

<body>

<header class="topbar">
  <div class="wrap topbar-inner">
    <a class="brand" href="index.html">H A N G M E N</a>
<nav class="nav">
  <a href="index.html#drop01">Drop 01</a>
</nav>
  </div>
</header>

<section class="hero">
  <div class="center">
   <div class="eyebrow">LIMITED PIECES / NO RESTOCK</div>
    <h1>DROP 02</h1>
    <div class="sub">COMING.</div>
    <a class="back" href="index.html">Back</a>
  </div>
</section>

</body>
</html>
